name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Build catalog manifests
        run: python scripts/catalog_build.py

      - name: Validate content sync schema (dry-run/no creds)
        env:
          DRY_RUN: "true"
        run: python scripts/content_sync.py

